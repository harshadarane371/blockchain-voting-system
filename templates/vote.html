<!DOCTYPE html>
<html>
    <head>
        <title>Vote</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <div class="container mt-5">
            <div class="card p-4 shadow">
                <h2 class="text-center mb-4">Cast your vote</h2>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Voter ID :</label><br>
                        <input type="text" name="voter_id" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Select Candidate</label>
                        <select name="candidate" class="form-select">
                            <option value="Candidate A">Candidate A</option>
                            <option value="Candidate B">Candidate B</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Submit Vote</button>
                </form>
            </div>
        </div>
    </body>
</html>
