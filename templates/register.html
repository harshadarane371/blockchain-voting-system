<!DOCTYPE html>

<html>
<head>
    <title>Voter Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card p-4 shadow col-md-5 mx-auto">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-success alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <h3 class="text-center mb-4">Voter Registration</h3>
            <form method="POST">
                <input type="text" name="voter_id" placeholder="Voter ID" class="form-control mb-3" required>
                <input type="text" name="aadhar" placeholder="Aadhaar Number" class="form-control mb-3" required>
                <input type="date" name="dob" class="form-control mb-3" required>
                <input type="text" name="name" placeholder="Full Name" class="form-control mb-3" required>
                <input type="password" name="password" placeholder="Password" class="form-control mb-3" required>
                <button type="submit" class="btn btn-success w-100">Register</button>
            </form>
            {% if error %}
            <p class="text-danger mt-3 text-center">{{ error }}</p>
            {% endif %}
            <div class="text-center mt-3">
                <a href="/voter_login">Already registered? Login</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
