<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card p-4 shadow col-md-5 mx-auto">
            <h3 class="text-center mb-4">Reset Password</h3>
            <p class="text-muted text-center small">Verify your identity to set a new password</p>
            
            <form method="POST">
                <input type="text" name="voter_id" placeholder="Voter ID" class="form-control mb-3" required>
                <input type="text" name="aadhar" placeholder="Aadhaar Number" class="form-control mb-3" required>
                <input type="date" name="dob" class="form-control mb-3" required>
                <hr>
                <input type="password" name="new_password" placeholder="Enter New Password" class="form-control mb-3" required>
                <button type="submit" class="btn btn-warning w-100">Reset Password</button>
            </form>

            <div class="text-center mt-3">
                <a href="/voter_login">Back to Login</a>
            </div>
        </div>
    </div>

    {% if alert_msg %}
    <script>alert("{{ alert_msg }}");</script>
    {% endif %}
</body>
</html>
