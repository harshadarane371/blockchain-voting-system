<!DOCTYPE html>
<html>
    <head>
        <title>Admin DAshboard</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            body{

                background:linear-gradient(to right, #6a11cb, #2575fc);
                color: white;
            }
            .card{
                border-radius: 15px;
                padding: 20px;
                text-align: center;
            }
            .btn-round{
                border-radius: 20px;
                padding: 8px 20px;
            }
        </style>
    </head>
    <body>
        <div class="container text-center mt-5">
            <h1>Blockchain E-Voting System</h1>
            <p>Admin Panel</p>
            <div class="bg-white text-dark p-3 rounded mb-4">
                <a href="/analytics" class="btn btn-info btn-round">Analytics</a>
                <a href="/manage_election" class="btn btn-warning btn-round">Manage Election</a>
                <a href="/logout" class="btn btn-danger btn-round">Logout</a>
            </div>
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="card text-dark">
                        <h5>View Results</h5>
                        <p>See current voting results</p>
                        <a href="/results" class="btn btn-primary">Results</a>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-dark">
                        <h5>Blockchain</h5>
                        <p>Validate blockchain integrity</p>
                        <a href="/validate" class="btn btn-primary">Validate Integrity</a>
                    </div>
                </div> 
                <div class="col-md-4">
                    <div class="card text-dark">
                        <h5>Manage Candidates</h5>
                        <p>Add or remove candidates</p>
                        <a href="/manage_candidates" class="btn btn-primary">Manage Candidates</a>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-dark">
                        <a href="/upload_voters" class="btn btn-success btn-round">Upload Voters</a>
                    </div>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
